<!DOCTYPE html>
<html>
<head>
    <title>Internship Opportunities</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

    <div class="container">
        <h1>Internship Opportunities</h1>

        <p>
            Enter your email to receive internship opportunities.
        </p>

        <form action="/submit-email" method="POST">
            <input
                type="email"
                name="email"
                placeholder="Enter your email"
                required
            >

            <button type="submit">
                Submit
            </button>
        </form>
    </div>

</body>
</html>
